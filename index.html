<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>三保〜清水港 津波避難×災害伝承AR（学習用試作）</title>
</head>
<body>
  <header id="appHeader">
    <div class="ttl">
      三保〜清水港 津波避難×災害伝承AR
      <span class="beta">学習用試作</span>
    </div>
    <div id="noticeBar">
      このシステムは平時の防災学習・避難訓練支援を目的とした試作です。実際の災害時は自治体・気象庁・消防・警察等の公式情報に従って避難してください。
    </div>
  </header>

  <div id="locBar">
    <label for="demoSelect">現在地:</label>
    <select id="demoSelect"></select>
    <span id="travelToggle" aria-label="移動手段">
      <button data-travel="foot" class="on" type="button">🚶 徒歩</button>
      <button data-travel="car" type="button">🚗 車</button>
    </span>
    <span id="locLabel"></span>
  </div>
  <div id="routeSummary" hidden></div>

  <main id="stage">
    <div id="map"></div>
    <div id="arView" hidden>
      <div id="arCanvasHolder"></div>
      <div id="arHeading"></div>
      <div id="arAttrib" hidden>町並み・地図 © OpenStreetMap contributors</div>
      <div id="arToast" hidden></div>
      <div id="arZoom">
        <button id="arZoomIn" type="button" aria-label="拡大">＋</button>
        <button id="arZoomOut" type="button" aria-label="縮小">－</button>
      </div>
      <canvas id="arMiniMap" aria-label="ミニマップ"></canvas>
      <div id="arOverlay"></div>
      <div id="arSimControls" hidden>
        <button id="arFaceBtn" type="button">🎯 進行方向</button>
        <button id="arResetBtn" type="button">🧭 北</button>
        <button id="arWalkResetBtn" type="button">↩ 出発点へ</button>
      </div>
      <div id="arDpad" hidden>
        <button data-move="F" type="button" aria-label="前進">▲</button>
        <div class="dpadMid">
          <button data-move="L" type="button" aria-label="左">◀</button>
          <button data-move="R" type="button" aria-label="右">▶</button>
        </div>
        <button data-move="B" type="button" aria-label="後退">▼</button>
      </div>
      <button id="arExit" type="button">✕ 終了</button>
    </div>

    <!-- Googleストリートビュー（追加ビュー）。既存の現地目線ビュー(#arView)とは独立した全画面表示。
         APIキー未設定・パノラマ未提供時は #svMessage を出し、既存ビューへ戻れるようにする。
         道順ガイド: #svGuide(次の方向ピル) / #svArrow(進行方向の矢印) / #svMiniMap(経路つきミニマップ)。
         いずれも上部・右上に集約し、Googleのロゴ・著作権・下部コントロールを覆わない。 -->
    <div id="streetView" hidden>
      <div id="svPano"></div>
      <div id="svArrow" hidden aria-hidden="true"><span id="svArrowInner">⬆</span></div>
      <div id="svGuide"></div>
      <canvas id="svMiniMap" aria-label="経路ミニマップ"></canvas>
      <div id="svOverlay"></div>
      <!-- Street View 内の2D地図（Google Maps JavaScript API の google.maps.Map）。避難所モードのみ。
           矢印で進めない時に「今どこ・経路はどちら・どちらへ戻るか」を2D地図で確認する補助。
           Google のロゴ・著作権・標準UIは隠さない。経路は参考表示（安全/正式な避難経路ではない）。 -->
      <button id="svMapBtn" type="button" hidden
              title="ストリートビューの矢印で進めない時は、2D地図で参考経路を確認できます">🗺 2D地図</button>
      <div id="svGoogleMapPanel" class="svGoogleMapPanel" hidden>
        <div class="svgmBar">
          <span class="svgmTitle">🗺 Google Mapで参考経路</span>
          <span id="svgmRouteMode" class="svgmMode"></span>
          <button id="svgmType" type="button" class="svgmBtn" aria-label="地図／空撮 切替" title="地図／空撮 切替">🛰</button>
          <button id="svGoogleMapExpand" type="button" class="svgmBtn" aria-label="拡大／縮小" title="拡大／縮小">⤢</button>
          <button id="svGoogleMapClose" type="button" class="svgmBtn" aria-label="閉じる" title="閉じる">✕</button>
        </div>
        <div id="svGoogleMap" class="svGoogleMap"></div>
        <div id="svGoogleMapNote" class="svGoogleMapNote">
          🔵 ストリートビュー現在位置（矢印=見ている向き）／🔴 避難施設／太線=参考経路。
          ストリートビューの矢印で経路通りに進めない時も、この2D地図で参考経路を確認できます。
          経路は<b>参考表示</b>であり正式な徒歩避難経路ではありません。実際の避難は自治体・気象庁等の公式情報に従ってください。
        </div>
      </div>
      <div id="svMessage" hidden></div>
      <button id="svExit" type="button">✕ 終了</button>
    </div>
  </main>

  <button id="sheetHandle" type="button" aria-label="一覧パネルの高さを変更（スワイプ／タップ）"
          aria-controls="panel" aria-expanded="true">
    <span class="grabber" aria-hidden="true"></span>
  </button>
  <nav id="tabs">
    <button data-tab="facilities" class="tab active" type="button">避難施設</button>
    <button data-tab="traditions" class="tab" type="button">伝承・史料</button>
    <button data-tab="ar" class="tab" type="button">現地目線</button>
    <button data-tab="about" class="tab" type="button">注意事項</button>
  </nav>
  <section id="panel"></section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
